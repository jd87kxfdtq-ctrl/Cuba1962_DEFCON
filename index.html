<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CUBA 1962: DEFCON</title>
  <style>
    :root {
      --bg: #07110c;
      --panel: #0e1a14;
      --panel-2: #122119;
      --line: #214132;
      --text: #d7e5db;
      --muted: #8ea695;
      --green: #61ff9a;
      --amber: #ffbf57;
      --red: #ff5b5b;
      --cyan: #75f8ff;
      --shadow: 0 0 0 1px rgba(117, 248, 255, 0.08), 0 10px 30px rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(70, 130, 95, 0.08), transparent 30%),
        repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px),
        var(--bg);
      color: var(--text);
      font-family: "IBM Plex Mono", "Consolas", monospace;
    }

    .app {
      max-width: 1600px;
      margin: 0 auto;
      padding: 16px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 16px;
      min-height: 100vh;
    }

    .topbar {
      display: grid;
      grid-template-columns: 1.6fr auto auto;
      gap: 12px;
      align-items: stretch;
    }

    .panel {
      background: linear-gradient(180deg, rgba(255,255,255,0.02), transparent 120%), var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
      position: relative;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, rgba(117,248,255,0.03), transparent 14%, transparent 86%, rgba(97,255,154,0.03));
      pointer-events: none;
    }

    .title-panel {
      padding: 16px 18px;
    }

    .eyebrow {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .title {
      font-family: "Orbitron", "Arial", sans-serif;
      font-size: clamp(24px, 3vw, 38px);
      letter-spacing: 0.08em;
      margin: 0;
      color: var(--green);
      text-shadow: 0 0 18px rgba(97,255,154,0.25);
    }

    .subtitle {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      max-width: 72ch;
    }

    .stat-chip {
      min-width: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 14px 16px;
    }

    .stat-chip .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 8px;
    }

    .stat-chip .value {
      font-family: "Orbitron", "Arial", sans-serif;
      font-size: 20px;
      color: var(--cyan);
      line-height: 1.2;
    }

    .main-grid {
      display: grid;
      grid-template-columns: minmax(560px, 1fr) minmax(280px, 360px);
      gap: 16px;
      align-items: start;
    }

    .panel-header {
      padding: 14px 16px;
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--cyan);
      font-family: "Orbitron", "Arial", sans-serif;
    }


    .situation-wrap { padding: 20px 18px 18px; }

    .scene-title {
      margin: 0 0 10px;
      font-family: "Orbitron", "Arial", sans-serif;
      font-size: 28px;
      color: var(--text);
      line-height: 1.15;
    }

    .actor-line {
      display: inline-block;
      margin: 0 0 14px;
      padding: 6px 10px;
      border: 1px solid rgba(97,255,154,0.25);
      border-radius: 999px;
      background: rgba(97,255,154,0.05);
      color: var(--green);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(97,255,154,0.18);
    }

    .scene-text {
      color: var(--text);
      line-height: 1.75;
      font-size: 15px;
      margin: 0 0 18px;
      min-height: 120px;
    }

    .scene-text p { margin: 0 0 12px; }
    .scene-text strong { color: var(--cyan); }

    .choices {
      display: grid;
      gap: 12px;
    }

    .choice {
      background: linear-gradient(180deg, rgba(255,255,255,0.03), transparent), var(--panel-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 14px;
      padding: 14px 14px 12px;
      text-align: left;
      cursor: pointer;
      transition: transform 140ms ease, border-color 140ms ease, box-shadow 140ms ease;
    }

    .choice:hover {
      transform: translateY(-1px);
      border-color: rgba(117,248,255,0.35);
      box-shadow: 0 0 0 1px rgba(117,248,255,0.06), 0 10px 20px rgba(0,0,0,0.2);
    }

    .choice-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
      color: var(--green);
    }

    .choice-desc {
      color: var(--text);
      font-size: 13px;
      line-height: 1.6;
      margin-bottom: 10px;
      opacity: 0.92;
    }

    .choice-effect {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .status-wrap { padding: 14px; display: grid; gap: 12px; }

    .defcon-card {
      padding: 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      transition: box-shadow 220ms ease, border-color 220ms ease;
    }

    .defcon-card.tutorial-focus {
      border-color: rgba(255,76,76,0.7);
      animation: defconPulse 1s ease-in-out infinite;
    }

    @keyframes defconPulse {
      0% {
        box-shadow: 0 0 0 1px rgba(255,76,76,0.14), 0 0 8px rgba(255,76,76,0.16), inset 0 0 6px rgba(255,76,76,0.05);
      }
      50% {
        box-shadow: 0 0 0 2px rgba(255,76,76,0.42), 0 0 22px rgba(255,76,76,0.42), inset 0 0 18px rgba(255,76,76,0.10);
      }
      100% {
        box-shadow: 0 0 0 1px rgba(255,76,76,0.14), 0 0 8px rgba(255,76,76,0.16), inset 0 0 6px rgba(255,76,76,0.05);
      }
    }

    .defcon-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .defcon-level {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }

    .defcon-value {
      font-family: "Orbitron", sans-serif;
      font-size: 34px;
      line-height: 1;
      color: var(--amber);
      text-shadow: 0 0 18px rgba(255,191,87,0.25);
    }

    .defcon-desc { color: var(--muted); font-size: 13px; }

    .defcon-track {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }

    .defcon-cell {
      height: 16px;
      border-radius: 999px;
      opacity: 0.25;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .defcon-cell.active { opacity: 1; box-shadow: 0 0 14px rgba(255,255,255,0.12); }

    .status-card {
      padding: 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      margin-bottom: 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-row strong {
      color: var(--text);
      font-family: "Orbitron", sans-serif;
      font-size: 15px;
      letter-spacing: 0.03em;
    }

    .bar {
      width: 100%;
      height: 12px;
      border-radius: 999px;
      background: #09120e;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.04);
    }

    .bar > span {
      display: block;
      height: 100%;
      width: 0%;
      border-radius: inherit;
      transition: width 260ms ease, background 260ms ease;
      box-shadow: inset 0 0 12px rgba(255,255,255,0.08), 0 0 12px rgba(255,255,255,0.06);
    }

    .bar-green > span { background: linear-gradient(90deg, #1c8f56, #61ff9a); }
    .bar-cyan > span { background: linear-gradient(90deg, #2e7f91, #75f8ff); }
    .bar-amber > span { background: linear-gradient(90deg, #8f5b1c, #ffbf57); }
    .bar-red > span { background: linear-gradient(90deg, #8a2525, #ff5b5b); }

    .bottom-panel {
      min-height: 170px;
    }

    .log-wrap {
      padding: 14px 16px 16px;
      display: grid;
      gap: 10px;
      max-height: 240px;
      overflow: auto;
    }

    .log-entry {
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.04);
      background: rgba(255,255,255,0.02);
      line-height: 1.55;
      color: var(--text);
      font-size: 13px;
    }

    .log-entry small {
      color: var(--muted);
      display: block;
      margin-bottom: 4px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .ending-card {
      border: 1px solid rgba(255,91,91,0.25);
      background: linear-gradient(180deg, rgba(255,91,91,0.08), transparent 55%), var(--panel-2);
      border-radius: 16px;
      padding: 16px;
      margin-top: 16px;
    }

    .ending-card.good {
      border-color: rgba(97,255,154,0.25);
      background: linear-gradient(180deg, rgba(97,255,154,0.08), transparent 55%), var(--panel-2);
    }

    .ending-card.neutral {
      border-color: rgba(255,191,87,0.25);
      background: linear-gradient(180deg, rgba(255,191,87,0.08), transparent 55%), var(--panel-2);
    }

    .ending-title {
      margin: 0 0 10px;
      font-family: "Orbitron", sans-serif;
      font-size: 22px;
    }

    .ending-debrief {
      margin-top: 12px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06);
      background: rgba(255,255,255,0.03);
      line-height: 1.6;
      color: var(--text);
      font-size: 14px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .control-btn {
      padding: 12px 14px;
      border-radius: 12px;
      border: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--text);
      cursor: pointer;
      font-family: inherit;
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .control-btn:hover { border-color: rgba(117,248,255,0.35); }
    .control-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
      border-color: rgba(255,255,255,0.08);
    }

    .control-btn.undo-prominent {
      width: 100%;
      min-height: 58px;
      padding: 16px 18px;
      border-color: rgba(255,191,87,0.62);
      background: linear-gradient(180deg, rgba(255,191,87,0.14), rgba(255,191,87,0.05) 65%), var(--panel-2);
      box-shadow: 0 0 0 1px rgba(255,191,87,0.14), 0 0 22px rgba(255,191,87,0.08);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.1em;
    }

    .control-btn.undo-prominent:hover,
    .control-btn.undo-prominent:focus-visible {
      border-color: rgba(255,191,87,0.9);
      box-shadow: 0 0 0 1px rgba(255,191,87,0.28), 0 0 28px rgba(255,191,87,0.16);
      transform: translateY(-1px);
    }

    .control-btn.undo-prominent:active {
      transform: translateY(0);
    }

    .intro-hint {
      margin: 10px 0 4px;
      color: var(--amber);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      text-align: center;
      display: none;
    }

    .choice.intro-choice {
      border-color: rgba(255,191,87,0.6);
      background: linear-gradient(180deg, rgba(255,191,87,0.16), rgba(255,191,87,0.06) 60%), var(--panel-2);
      box-shadow: 0 0 0 1px rgba(255,191,87,0.18), 0 0 24px rgba(255,191,87,0.08);
      max-width: 560px;
      margin: 12px auto 0;
      min-height: 132px;
    }

    .choice.intro-choice .choice-title {
      color: var(--amber);
      font-size: 20px;
      letter-spacing: 0.12em;
    }

    .choice.intro-choice .choice-desc {
      font-size: 14px;
      color: var(--text);
    }

    .choice.intro-choice:hover,
    .choice.intro-choice:focus-visible {
      transform: translateY(-2px);
      border-color: rgba(255,191,87,0.92);
      box-shadow: 0 0 0 1px rgba(255,191,87,0.32), 0 0 28px rgba(255,191,87,0.18);
    }

    .choice.intro-choice:active {
      transform: translateY(0);
    }


    @media (max-width: 1180px) {
      .main-grid { grid-template-columns: 1fr; }
      .topbar { grid-template-columns: 1fr 1fr; }
      .control-btn.undo-prominent {
        min-height: 62px;
        font-size: 15px;
      }
    }

    @media (max-width: 760px) {
      .topbar { grid-template-columns: 1fr; }
      .stat-chip { min-width: 0; }
    }
  </style>
</head>
<body>
  <div class="app">
    <section class="topbar">
      <div class="panel title-panel">
        <div class="eyebrow">Cold War Crisis Simulation</div>
        <h1 class="title" id="app-title">CUBA 1962: DEFCON</h1>
      </div>
      <div class="panel stat-chip">
        <div class="label">Datum</div>
        <div class="value" id="top-date">16 OCT 1962</div>
      </div>
      <div class="panel stat-chip">
        <div class="label">Am Zug</div>
        <div class="value" id="top-actor">SYSTEM</div>
      </div>
    </section>

    <section class="main-grid">
            <div class="panel">
        <div class="panel-header"><h2>Lagebericht</h2></div>
        <div class="situation-wrap">
          <div class="actor-line" id="scene-actor">Am Zug: SYSTEM</div>
          <h2 class="scene-title" id="scene-title">Intro</h2>
          <p class="scene-text" id="scene-text"></p>
          <div class="intro-hint" id="intro-hint">Tippe auf den Button, um fortzufahren.</div>
          <div class="controls" id="scene-controls" style="display:none; justify-content:flex-end; margin-top:10px; margin-bottom:8px;">
            <button class="control-btn undo-prominent" id="undo-btn" type="button">Letzte Entscheidung zurücknehmen</button>
          </div>
                    <div class="choices" id="choices"></div>
          <div id="ending-container"></div>
        </div>
      </div>

      <div class="panel">
        <div class="panel-header"><h2>Statuspanel</h2></div>
        <div class="status-wrap">
          <div class="defcon-card" id="defcon-card">
            <div class="defcon-label">DEFCON-Status</div>
            <div class="defcon-level">
              <div class="defcon-value" id="defcon-value">4</div>
              <div class="defcon-desc" id="defcon-desc">Ernste Krise</div>
            </div>
            <div class="defcon-track" id="defcon-track"></div>
          </div>

          <div class="status-card">
            <div class="status-row"><span>Stärke USA</span><strong id="usa-value">70</strong></div>
            <div class="bar bar-cyan"><span id="usa-bar"></span></div>
          </div>

          <div class="status-card">
            <div class="status-row"><span>Stärke UdSSR</span><strong id="ussr-value">70</strong></div>
            <div class="bar bar-red"><span id="ussr-bar"></span></div>
          </div>

          <div class="status-card">
            <div class="status-row"><span>Kommunikation</span><strong id="communication-value">50</strong></div>
            <div class="bar bar-green"><span id="communication-bar"></span></div>
          </div>

          <div class="status-card">
            <div class="status-row"><span>Kuba-Sicherheit</span><strong id="cuba-value">60</strong></div>
            <div class="bar bar-amber"><span id="cuba-bar"></span></div>
          </div>
        </div>
      </div>
    </section>

    <section class="panel bottom-panel">
      <div class="panel-header"><h2>Einsatzprotokoll</h2></div>
      <div class="log-wrap" id="log-wrap"></div>
    </section>
  </div>

  <script>

    const CHOICE_INFO = {
      "Simulation starten": "Du wechselst in den Krisenmodus und beginnst mit der ersten historischen Entscheidung der Kubakrise.",
      "Luftschlag anordnen": "Die USA bombardieren sowjetische Raketenstellungen auf Kuba. Das wirkt entschlossen, kann aber sofort militärische Gegenreaktionen auslösen.",

      "Geheimen Verhandlungskanal öffnen": "Die USA suchen zunächst eine verdeckte diplomatische Lösung, ohne die Krise öffentlich maximal zuzuspitzen.",

      "Zeit gewinnen, Raketen fertigstellen": "Die UdSSR nutzt die Diplomatie taktisch, um auf Kuba Fakten zu schaffen.",
      "Gespräche leaken und US-Schwäche markieren": "Moskau macht die geheimen Kontakte öffentlich, damit die USA innenpolitisch schwächer wirken.",

      "Nichtangriffsgarantie für Kuba anbieten": "Die USA signalisieren, dass sie Kuba nicht angreifen werden, wenn die Raketen verschwinden.",

      "NATO-Bereitschaft erhöhen": "Die USA und ihre Verbündeten gehen militärisch auf Alarmstufe und signalisieren Entschlossenheit.",
      "Nur öffentlich drohen": "Washington bleibt verbal hart, ohne sofort weitere militärische Schritte einzuleiten.",
      "Zurück zum Verhandlungskanal": "Trotz öffentlichem Druck setzt die USA erneut auf Diplomatie und geheime Kontakte.",
      "Luftschlag vorbereiten": "Die USA bereiten einen Angriff auf Kuba vor, um die Raketenstellungen auszuschalten, bevor sie einsatzbereit werden.",

      "Raketen gegen Nichtangriffsgarantie abziehen": "Die UdSSR zieht die Raketen ab, wenn Kuba vor einer US-Invasion geschützt wird.",
      "Raketen gegen geheimen Türkei-Deal abziehen": "Moskau akzeptiert einen stillen Tausch, um sowohl Sicherheit als auch Prestige teilweise zu retten.",
      "Auf vollem Prestigegewinn bestehen": "Die UdSSR versucht, maximalen politischen Gewinn aus der Krise zu ziehen, anstatt früh nachzugeben.",
      "Berlin-Druck zurücknehmen und Kuba-Deal akzeptieren": "Moskau entschärft die Europa-Front und akzeptiert eine Lösung über Kuba.",
      "Berlin weiter eskalieren": "Die UdSSR verschärft zusätzlich die Lage in Europa, obwohl die Kuba-Krise bereits hochgefährlich ist.",

                        "summary": "Fehlentscheidungen und harte Reaktionen haben die Abschreckung unterhalb der nuklearen Schwelle scheitern lassen."
                  }
            },
            {
                  "id": "E6",
                  "type": "ending",
                  "title": "Nukleare Katastrophe",
                  "resultType": "nuclear_war",
                  "mapState": "nuclear_exchange",
                  "text": "Die Krise gerät außer Kontrolle. Abschreckung und Kommunikation brechen zusammen. Der Konflikt eskaliert in den Atomkrieg.",
                  "historicalComparison": "Historisch wurde dieser Ausgang in der Kubakrise nur knapp vermieden.",
                  "debrief": {
                        "headline": "DEFCON-Kollaps",
                        "summary": "Die Supermächte haben die Eskalationsspirale nicht mehr unter Kontrolle. Die Krise endet im schlimmstmöglichen Szenario."
                  }
            }
      ]
};

    const nodesById = Object.fromEntries(DATA.nodes.map(n => [n.id, n]));
    const endingsById = Object.fromEntries(DATA.endings.map(e => [e.id, e]));

    function cloneDeep(value) {
      return JSON.parse(JSON.stringify(value));
    }

    let state = cloneDeep(DATA.initialState);
    let historyStack = [];

    const sceneTitleEl = document.getElementById('scene-title');
    const sceneActorEl = document.getElementById('scene-actor');
    const sceneTextEl = document.getElementById('scene-text');
    const choicesEl = document.getElementById('choices');
    const endingContainerEl = document.getElementById('ending-container');
    const introHintEl = document.getElementById('intro-hint');
    const sceneControlsEl = document.getElementById('scene-controls');
    const undoBtnEl = document.getElementById('undo-btn');
    const logWrapEl = document.getElementById('log-wrap');

    const topDateEl = document.getElementById('top-date');
    const topActorEl = document.getElementById('top-actor');
    const appTitleEl = document.getElementById('app-title');

    const defconCardEl = document.getElementById('defcon-card');
    const defconValueEl = document.getElementById('defcon-value');
    const defconDescEl = document.getElementById('defcon-desc');
    const defconTrackEl = document.getElementById('defcon-track');

    const usaValueEl = document.getElementById('usa-value');
    const ussrValueEl = document.getElementById('ussr-value');
    const communicationValueEl = document.getElementById('communication-value');
    const cubaValueEl = document.getElementById('cuba-value');

    const usaBarEl = document.getElementById('usa-bar');
    const ussrBarEl = document.getElementById('ussr-bar');
    const communicationBarEl = document.getElementById('communication-bar');
    const cubaBarEl = document.getElementById('cuba-bar');

    const DEFCON_COLORS = {
      5: '#61ff9a',
      4: '#98ff74',
      3: '#ffbf57',
      2: '#ff8a4a',
      1: '#ff5b5b'
    };

    const DEFCON_LABELS = {
      5: 'Angespannt, aber stabil',
      4: 'Ernste Krise',
      3: 'Akute Eskalation',
      2: 'Unmittelbare Kriegsgefahr',
      1: 'Nukleare Katastrophe droht'
    };

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function applyEffects(effects) {
      state.defcon = clamp(state.defcon + (effects.defcon ?? 0), 1, 5);
      state.usaStrength = clamp(state.usaStrength + (effects.usaStrength ?? 0), 0, 100);
      state.ussrStrength = clamp(state.ussrStrength + (effects.ussrStrength ?? 0), 0, 100);
      state.communication = clamp(state.communication + (effects.communication ?? 0), 0, 100);
      state.cubaSafety = clamp(state.cubaSafety + (effects.cubaSafety ?? 0), 0, 100);
    }

    function conditionMatches(condition) {
      if (!condition) return true;
      if (typeof condition.defconLte === 'number' && !(state.defcon <= condition.defconLte)) return false;
      if (typeof condition.communicationGte === 'number' && !(state.communication >= condition.communicationGte)) return false;
      return true;
    }

    function resolveNext(choice) {
      if (choice.branches?.length) {
        for (const branch of choice.branches) {
          if (conditionMatches(branch.when)) return branch.next;
        }
      }
      return choice.next;
    }

    function addLogEntry(text, nodeTitle, nodeDate) {
      state.log.unshift({
        date: nodeDate || '',
        title: nodeTitle,
        text
      });
      state.log = state.log.slice(0, 18);
    }

    function formatEffects(choice) {
      const e = choice.effects || {};
      const bits = [];
      if (e.defcon) bits.push(`DEFCON ${e.defcon > 0 ? '+' : ''}${e.defcon}`);
      if (e.usaStrength) bits.push(`USA ${e.usaStrength > 0 ? '+' : ''}${e.usaStrength}`);
      if (e.ussrStrength) bits.push(`UdSSR ${e.ussrStrength > 0 ? '+' : ''}${e.ussrStrength}`);
      if (e.communication) bits.push(`Kommunikation ${e.communication > 0 ? '+' : ''}${e.communication}`);
      if (e.cubaSafety) bits.push(`Kuba-Sicherheit ${e.cubaSafety > 0 ? '+' : ''}${e.cubaSafety}`);
      return bits.join(' · ');
    }

    function getCurrentEntity() {
      return nodesById[state.currentNode] || endingsById[state.currentNode];
    }

    function isIntroNodeId(nodeId) {
      return ['N00','N0','N0B'].includes(nodeId);
    }

    function isEndingNodeId(nodeId) {
      return !!endingsById[nodeId];
    }

    function canUndo() {
      return historyStack.length > 0 && !isIntroNodeId(state.currentNode);
    }

    function renderUndoControl() {
      const showUndo = !isIntroNodeId(state.currentNode);
      sceneControlsEl.style.display = showUndo ? 'flex' : 'none';
      undoBtnEl.disabled = !canUndo();
      undoBtnEl.title = canUndo() ? 'Setzt die letzte Entscheidung zurück.' : 'Noch keine Entscheidung zum Zurücknehmen vorhanden.';
    }

    function renderDefcon() {
      defconValueEl.textContent = state.defcon;
      defconDescEl.textContent = DEFCON_LABELS[state.defcon];
      defconValueEl.style.color = DEFCON_COLORS[state.defcon];
      defconTrackEl.innerHTML = '';
      for (let level = 5; level >= 1; level--) {
        const cell = document.createElement('div');
        cell.className = 'defcon-cell';
        cell.style.background = DEFCON_COLORS[level];
        if (state.defcon === level) cell.classList.add('active');
        defconTrackEl.appendChild(cell);
      }
    }

    function setBar(el, value) {
      el.style.width = `${value}%`;
    }

    function renderStatus() {
      usaValueEl.textContent = state.usaStrength;
      ussrValueEl.textContent = state.ussrStrength;
      communicationValueEl.textContent = state.communication;
      cubaValueEl.textContent = state.cubaSafety;

      setBar(usaBarEl, state.usaStrength);
      setBar(ussrBarEl, state.ussrStrength);
      setBar(communicationBarEl, state.communication);
      setBar(cubaBarEl, state.cubaSafety);

      renderDefcon();
    }

    function renderLog() {
      logWrapEl.innerHTML = '';
      if (!state.log.length) {
        const empty = document.createElement('div');
        empty.className = 'log-entry';
        empty.innerHTML = `<small>Protokoll</small>Noch keine Entscheidungen protokolliert.`;
        logWrapEl.appendChild(empty);
        return;
      }
      state.log.forEach(entry => {
        const div = document.createElement('div');
        div.className = 'log-entry';
        div.innerHTML = `<small>${entry.date}${entry.title ? ' · ' + entry.title : ''}</small>${entry.text}`;
        logWrapEl.appendChild(div);
      });
    }

    function renderMap() {}

    function renderScene(node) {
      topDateEl.textContent = node.date;
      topActorEl.textContent = node.actor;
      appTitleEl.title = `Aktueller Knoten: ${node.id}`;
      sceneTitleEl.textContent = node.title;
      sceneActorEl.textContent = `Am Zug: ${node.actor}`;
      sceneTextEl.innerHTML = node.text;
      endingContainerEl.innerHTML = '';
      choicesEl.innerHTML = '';

      const isIntroNode = isIntroNodeId(node.id);
      introHintEl.style.display = isIntroNode ? 'block' : 'none';
      renderUndoControl();

      node.choices.forEach(choice => {
        const btn = document.createElement('button');
        btn.className = isIntroNode ? 'choice intro-choice' : 'choice';
        btn.type = 'button';
        const choiceInfo = choice.description || CHOICE_INFO[choice.label] || 'Diese Entscheidung verändert den weiteren Verlauf der Krise und kann spätere Optionen einschränken oder erweitern.';
        btn.innerHTML = `
          <div class="choice-title">${choice.label}</div>
          <div class="choice-desc">${choiceInfo}</div>
          <div class="choice-effect">${formatEffects(choice)}</div>
        `;
        btn.addEventListener('click', () => choose(node, choice));
        choicesEl.appendChild(btn);
      });

    }

    function endingClass(resultType) {
      if (resultType === 'deescalation') return 'good';
      if (resultType === 'stalemate') return 'neutral';
      return '';
    }

    function renderEnding(ending) {
      topDateEl.textContent = '28 OCT 1962';
      topActorEl.textContent = 'SIMULATION BEENDET';
      appTitleEl.title = `Aktueller Knoten: ${ending.id}`;
      sceneTitleEl.textContent = 'Simulation beendet';
      sceneActorEl.textContent = 'Am Zug: Debriefing';
      sceneTextEl.innerHTML = `<p>${ending.text}</p><p style="color: var(--muted); margin-top: 12px;"><strong>Historischer Vergleich:</strong> ${ending.historicalComparison}</p>`;
      introHintEl.style.display = 'none';
      choicesEl.innerHTML = '';
      renderUndoControl();

      endingContainerEl.innerHTML = `
        <div class="ending-card ${endingClass(ending.resultType)}">
          <h3 class="ending-title">${ending.title}</h3>
          <div class="ending-debrief">
            <strong>${ending.debrief.headline}</strong><br>
            ${ending.debrief.summary}
          </div>
          <div class="ending-debrief" style="margin-top:10px;">
            <strong>Abschlusswerte</strong><br>
            DEFCON: ${state.defcon}<br>
            Stärke USA: ${state.usaStrength}<br>
            Stärke UdSSR: ${state.ussrStrength}<br>
            Kommunikation: ${state.communication}<br>
            Kuba-Sicherheit: ${state.cubaSafety}
          </div>
          <div class="controls">
            <button class="control-btn" id="restart-btn">Neu starten</button>
          </div>
        </div>
      `;

      document.getElementById('restart-btn').addEventListener('click', restartGame);
    }

    function choose(currentNode, choice) {
      if (!isIntroNodeId(currentNode.id)) {
        historyStack.push(cloneDeep(state));
      }
      applyEffects(choice.effects || {});
      addLogEntry(choice.logText || choice.label, currentNode.title, currentNode.date);
      const nextId = resolveNext(choice);
      state.currentNode = nextId;
      render();
    }

    function undoLastDecision() {
      if (!canUndo()) return;
      state = historyStack.pop();
      render();
    }

    function render() {
      renderStatus();
      renderLog();
      defconCardEl.classList.toggle('tutorial-focus', state.currentNode === 'N0B');
      const entity = getCurrentEntity();
      if (!entity) {
        sceneTitleEl.textContent = 'Fehler';
        sceneActorEl.textContent = 'Am Zug: System';
        sceneTextEl.textContent = 'Der nächste Knoten konnte nicht geladen werden.';
        appTitleEl.title = 'Aktueller Knoten: unbekannt';
        introHintEl.style.display = 'none';
        choicesEl.innerHTML = '';
        endingContainerEl.innerHTML = '<div class="ending-card"><div class="controls"><button class="control-btn" onclick="location.reload()">Neu laden</button></div></div>';
        return;
      }
      if (entity.type === 'ending') {
        renderEnding(entity);
      } else {
        renderScene(entity);
      }
    }

    function restartGame() {
      state = cloneDeep(DATA.initialState);
      historyStack = [];
      render();
    }

    undoBtnEl.addEventListener('click', undoLastDecision);

    appTitleEl.title = `Aktueller Knoten: ${state.currentNode}`;
    render();
  </script>
</body>
</html>
